services:
  - type: web
    name: depression-prediction-api
    env: python
    region: oregon
    plan: free
    pythonVersion: "3.11"
    buildCommand: pip install --upgrade pip && pip install -r backend/requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu
    startCommand: cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ENV
        value: production
